<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Колесо фортуны</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <section class="wheel-panel">
      <div id="wheelFrame" class="wheel-frame">
        <div class="pointer" aria-hidden="true"></div>
        <canvas
          id="wheelCanvas"
          width="720"
          height="720"
          aria-label="Колесо фортуны"
        ></canvas>
        <div id="resultOverlay" class="result-overlay" aria-live="polite" aria-atomic="true">
          <div id="resultToast" class="result-toast">
            <span id="resultVariant" class="result-variant"></span>
          </div>
        </div>
      </div>

      <div class="wheel-actions">
        <button id="spinButton" class="primary-button wheel-spin-button" type="button">Крутить</button>
      </div>
    </section>

    <aside class="control-panel">
      <div class="panel-header">
        <p class="eyebrow">Тестовый режим</p>
        <h1>Колесо фортуны</h1>
        <p class="panel-description">
          Две отдельные рулетки со своими вариантами. Можно переключаться между вкладками и редактировать содержимое каждой.
        </p>
      </div>

      <section class="card">
        <div class="card-title-row">
          <h2>Вкладки</h2>
          <div class="tab-actions">
            <button id="addTabButton" class="ghost-button" type="button">Новая</button>
            <button id="removeTabButton" class="ghost-button" type="button">Удалить</button>
          </div>
        </div>
        <div id="tabList" class="tab-list" aria-label="Список вкладок"></div>
      </section>

      <section class="card">
        <div class="card-title-row">
          <h2>Варианты активной вкладки</h2>
          <button id="addSectorButton" class="ghost-button" type="button">Добавить</button>
        </div>
        <div id="sectorList" class="sector-list" aria-live="polite"></div>
      </section>
    </aside>
  </main>

  <script src="script.js"></script>
</body>
</html>
